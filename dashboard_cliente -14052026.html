<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Saúde - CR$ HOME CARE AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #0A1128 0%, #1a2f4a 100%);
            min-height: 100vh;
            color: #FFFFFF;
        }
        
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }
        
        /* HEADER */
        .header {
            position: relative;
            z-index: 100;
            background: rgba(11, 26, 58, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #00D4FF;
        }
        
        .btn-logout {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            color: #EF4444;
            padding: 10px 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.25);
        }
        
        /* MAIN CONTAINER */
        .main-container {
            position: relative;
            z-index: 10;
            padding: 32px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* WELCOME BANNER */
        .welcome-banner {
            background: linear-gradient(135deg, rgba(0, 82, 255, 0.15), rgba(0, 212, 255, 0.1));
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 20px;
            padding: 28px 32px;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .welcome-text h2 {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 6px;
        }
        
        .welcome-text p {
            color: #8A9BB5;
            font-size: 0.9rem;
        }
        
        .welcome-right {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        
        .stat-card {
            background: rgba(11, 26, 58, 0.6);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 12px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .stat-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(124, 58, 237, 0.3));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }
        
        .stat-value {
            font-size: 1.4rem;
            font-weight: 900;
            color: #FFFFFF;
            line-height: 1;
        }
        
        .stat-label {
            font-size: 0.7rem;
            color: #8A9BB5;
        }
        
        .date-display {
            text-align: right;
            background: rgba(11, 26, 58, 0.6);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(0, 212, 255, 0.15);
        }
        
        .date-display .day {
            font-size: 2rem;
            font-weight: 900;
            color: #00D4FF;
            line-height: 1;
        }
        
        .date-display .month-year {
            font-size: 0.8rem;
            color: #8A9BB5;
            margin-top: 4px;
        }
        
        /* MAIN GRID */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 24px;
        }
        
        @media (max-width: 1200px) {
            .main-grid { grid-template-columns: 1fr; }
        }
        
        /* SECTION */
        .section {
            background: rgba(11, 26, 58, 0.6);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 20px;
            padding: 24px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* TABS */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        
        .tab {
            flex: 1;
            min-width: 100px;
            padding: 12px 8px;
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 12px;
            font-weight: 600;
            color: #8A9BB5;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        
        .tab.active {
            background: linear-gradient(135deg, #0052FF, #00D4FF);
            color: white;
            border-color: transparent;
        }
        
        .screen {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        .screen.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* CLIENT INFO CARD */
        .client-info-card {
            background: rgba(17, 27, 51, 0.6);
            border: 1px solid rgba(138, 155, 181, 0.1);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .client-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 82, 255, 0.2));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            border: 2px solid rgba(0, 212, 255, 0.3);
        }
        
        .client-name {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 4px;
        }
        
        .counters {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }
        
        .counter-box {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            padding: 6px 10px;
            text-align: center;
            min-width: 50px;
        }
        
        .counter-value {
            font-weight: 800;
            font-size: 0.9rem;
            color: #00D4FF;
            display: block;
        }
        
        .counter-label {
            font-size: 0.65rem;
            color: #8A9BB5;
        }
        
        /* CARDS DE CONTEÚDO */
        .content-card {
            background: rgba(17, 27, 51, 0.6);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 16px;
            border-left: 4px solid #00D4FF;
        }
        
        .content-card.medicine { border-left-color: #667eea; }
        .content-card.appointment { border-left-color: #f59e0b; }
        .content-card.responsible { border-left-color: #8b5cf6; }
        .content-card.contact { border-left-color: #ec4899; }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
        }
        
        .card-subtitle {
            color: #8A9BB5;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        
        .card-info {
            color: #C5D0E0;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }
        
        .card-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-card {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        
        .btn-secondary {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }
        
        /* CALENDÁRIO */
        .calendar-container {
            background: rgba(17, 27, 51, 0.6);
            border-radius: 14px;
            padding: 20px;
        }
        
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .calendar-title {
            font-weight: 700;
            font-size: 1rem;
        }
        
        .calendar-nav {
            display: flex;
            gap: 8px;
        }
        
        .calendar-btn {
            width: 30px;
            height: 30px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #00D4FF;
        }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }
        
        .calendar-day-header {
            font-size: 0.7rem;
            color: #8A9BB5;
            padding: 8px 0;
            font-weight: 600;
        }
        
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 600;
            position: relative;
        }
        
        .calendar-day:hover {
            background: rgba(0, 212, 255, 0.1);
        }
        
        .calendar-day.today {
            background: linear-gradient(135deg, #0052FF, #00D4FF);
            font-weight: 800;
        }
        
        .calendar-day.has-event::after {
            content: '';
            position: absolute;
            bottom: 3px;
            width: 5px;
            height: 5px;
            background: #34D399;
            border-radius: 50%;
        }
        
        /* FAB */
        .fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 2rem;
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
            cursor: pointer;
            transition: all 0.3s;
            z-index: 200;
        }
        
        .fab:active {
            transform: scale(0.95);
        }
        
        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 300;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a2f4a;
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 24px;
            padding: 24px;
            width: 100%;
            max-width: 450px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-title {
            font-size: 1.3rem;
            font-weight: 700;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #8A9BB5;
            cursor: pointer;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            display: block;
            font-weight: 600;
            color: #C5D0E0;
            margin-bottom: 8px;
        }
        
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 14px;
            background: rgba(11, 26, 58, 0.6);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            border-color: #00D4FF;
        }
        
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #0052FF, #00D4FF);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
        }
        
        /* TOAST */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 14px 24px;
            border-radius: 14px;
            font-weight: 600;
            z-index: 400;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .toast.show {
            opacity: 1;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #8A9BB5;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8A9BB5;
        }
        
        .empty-state .icon {
            font-size: 4rem;
            display: block;
            margin-bottom: 16px;
        }
        
        @media (max-width: 768px) {
            .header { padding: 16px 20px; }
            .main-container { padding: 20px; }
            .welcome-banner { flex-direction: column; text-align: center; gap: 20px; }
            .welcome-right { justify-content: center; }
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    
    <!-- HEADER -->
    <header class="header">
        <div class="header-left">
            <div class="logo">CR$ HOME CARE</div>
        </div>
        <button class="btn-logout" onclick="handleLogout()">Sair</button>
    </header>
    
    <!-- MAIN CONTAINER -->
    <div class="main-container">
        <!-- WELCOME BANNER -->
        <div class="welcome-banner">
            <div class="welcome-text">
                <h2 id="greeting">Bom dia!</h2>
                <p>Aqui está o resumo do cuidado de hoje</p>
            </div>
            <div class="welcome-right">
                <div class="stat-card">
                    <div class="stat-icon">👥</div>
                    <div>
                        <div class="stat-value" id="total-meds">0</div>
                        <div class="stat-label">Meus Itens</div>
                    </div>
                </div>
                <div class="date-display">
                    <div class="day" id="current-day">09</div>
                    <div class="month-year" id="current-month">Maio 2026</div>
                </div>
            </div>
        </div>
        
        <!-- MAIN GRID -->
        <div class="main-grid">
            <!-- LEFT: CONTENT -->
            <div class="section">
                <div class="section-header">
                    <div class="section-title">👤 Meus Dados</div>
                </div>
                
                <!-- CLIENT INFO CARD -->
                <div class="client-info-card">
                    <div class="client-avatar">👤</div>
                    <div class="client-name" id="client-name">Carregando...</div>
                    <div class="counters">
                        <div class="counter-box">
                            <span class="counter-value" id="count-meds">0</span>
                            <span class="counter-label">Remédios</span>
                        </div>
                        <div class="counter-box">
                            <span class="counter-value" id="count-appts">0</span>
                            <span class="counter-label">Consultas</span>
                        </div>
                        <div class="counter-box">
                            <span class="counter-value" id="count-resp">0</span>
                            <span class="counter-label">Responsáveis</span>
                        </div>
                        <div class="counter-box" style="border-color: #ec4899;">
                            <span class="counter-value" id="count-contacts" style="color: #ec4899;">0</span>
                            <span class="counter-label">Contatos</span>
                        </div>
                    </div>
                </div>
                
                <!-- TABS -->
                <div class="tabs">
                    <button class="tab active" onclick="showScreen('medications', this)">💊 Remédios</button>
                    <button class="tab" onclick="showScreen('appointments', this)">📅 Consultas</button>
                    <button class="tab" onclick="showScreen('responsibles', this)">👨‍ Responsável</button>
                    <button class="tab" onclick="showScreen('contacts', this)">📞 Contatos</button>
                </div>
                
                <!-- SCREENS -->
                <div id="screen-medications" class="screen active">
                    <div id="medications-list"><div class="loading">⏳ Carregando...</div></div>
                </div>
                <div id="screen-appointments" class="screen">
                    <div id="appointments-list"><div class="loading">⏳ Carregando...</div></div>
                </div>
                <div id="screen-responsibles" class="screen">
                    <div id="responsibles-list"><div class="loading">⏳ Carregando...</div></div>
                </div>
                <div id="screen-contacts" class="screen">
                    <div id="contacts-list"><div class="loading">⏳ Carregando...</div></div>
                </div>
            </div>
            
            <!-- RIGHT: CALENDAR -->
            <div class="section">
                <div class="section-header">
                    <div class="section-title">📅 Calendário</div>
                </div>
                <div class="calendar-container" id="calendar">
                    <!-- Generated by JavaScript -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- FAB -->
    <button class="fab" id="fab-btn" onclick="handleFabClick()" style="display: none;">+</button>
    
    <!-- MODALS (Medication, Appointment, Responsible, Contact) -->
    <!-- [Mesmos modais do código anterior] -->
    
    <div class="toast" id="toast"></div>
    
    <script>
        const API_URL = 'http://localhost:8000';
        let userId = null;
        let currentUser = null;
        let currentScreen = 'medications';
        
        // ===== INICIALIZAÇÃO =====
        document.addEventListener('DOMContentLoaded', function() {
            userId = localStorage.getItem('userId');
            currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
            if (!userId) { window.location.href = '/'; return; }
            
            const hour = new Date().getHours();
            const greeting = hour < 12 ? 'Bom dia' : hour < 18 ? 'Boa tarde' : 'Boa noite';
            document.getElementById('greeting').textContent = `${greeting}!`;
            document.getElementById('client-name').textContent = currentUser.full_name || 'Paciente';
            
            setCurrentDate();
            generateCalendar();
            loadAllData();
        });
        
        function setCurrentDate() {
            const now = new Date();
            const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
            document.getElementById('current-day').textContent = String(now.getDate()).padStart(2,'0');
            document.getElementById('current-month').textContent = `${months[now.getMonth()]} ${now.getFullYear()}`;
        }
        
        function generateCalendar() {
            const now = new Date();
            const monthNames = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
            const dayNames = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const today = now.getDate();
            
            let html = `
                <div class="calendar-header">
                    <div class="calendar-title">${monthNames[now.getMonth()]} ${now.getFullYear()}</div>
                    <div class="calendar-nav">
                        <div class="calendar-btn">‹</div>
                        <div class="calendar-btn">›</div>
                    </div>
                </div>
                <div class="calendar-grid">
                    ${dayNames.map(d => `<div class="calendar-day-header">${d}</div>`).join('')}
                    ${Array(firstDay).fill('<div></div>').join('')}
                    ${Array.from({length: daysInMonth}, (_, i) => {
                        const day = i + 1;
                        const classes = ['calendar-day'];
                        if (day === today) classes.push('today');
                        if ([7, 9, 15, 22].includes(day)) classes.push('has-event');
                        return `<div class="${classes.join(' ')}">${day}</div>`;
                    }).join('')}
                </div>
            `;
            
            document.getElementById('calendar').innerHTML = html;
        }
        
        function loadAllData() {
            loadMedications();
            loadAppointments();
            loadResponsibles();
            loadContacts();
        }
        
        function showScreen(screen, btn) {
            currentScreen = screen;
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`screen-${screen}`).classList.add('active');
            if (btn) btn.classList.add('active');
            
            const fab = document.getElementById('fab-btn');
            if (screen === 'medications') { 
                fab.style.display = 'block'; 
                fab.style.background = 'linear-gradient(135deg, #10b981, #059669)'; 
                fab.onclick = openMedModal; 
            } else if (screen === 'appointments') { 
                fab.style.display = 'block'; 
                fab.style.background = 'linear-gradient(135deg, #f59e0b, #d97706)'; 
                fab.onclick = openApptModal; 
            } else if (screen === 'responsibles') { 
                fab.style.display = 'block'; 
                fab.style.background = 'linear-gradient(135deg, #8b5cf6, #6d28d9)'; 
                fab.onclick = openRespModal; 
            } else if (screen === 'contacts') { 
                fab.style.display = 'block'; 
                fab.style.background = 'linear-gradient(135deg, #ec4899, #be185d)'; 
                fab.onclick = openContactModal; 
            } else { 
                fab.style.display = 'none'; 
            }
        }
        
        function handleFabClick() {
            if (currentScreen === 'medications') openMedModal();
            else if (currentScreen === 'appointments') openApptModal();
            else if (currentScreen === 'responsibles') openRespModal();
            else if (currentScreen === 'contacts') openContactModal();
        }
        
        function handleLogout() { 
            if (confirm('Deseja sair?')) { 
                localStorage.clear(); 
                window.location.href = '/'; 
            } 
        }
